<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0e">
<title>Bogong Dial — Live Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e;
    --surface: #111116;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border-gold: rgba(212,175,55,0.3);
    --text: #e8e6e0;
    --text-mid: #9a9690;
    --text-dim: #5a5854;
    --gold: #d4af37;
    --gold-dim: rgba(212,175,55,0.5);
    --green: #4caf7d;
    --red: #e05555;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  /* DEMO BANNER */
  .demo-banner {
    background: rgba(212,175,55,0.08);
    border-bottom: 1px solid var(--border-gold);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .demo-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
  .demo-restart { background:none; border:1px solid var(--border-gold); color:var(--gold-dim); font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; padding:6px 14px; cursor:pointer; text-transform:uppercase; }
  .demo-restart:hover { color:var(--gold); border-color:var(--gold); }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-brand { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:4px; color:var(--gold); text-transform:uppercase; }
  .header-sub { font-size:10px; color:var(--text-dim); margin-top:2px; }
  .header-status { display:flex; align-items:center; gap:10px; }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--text-dim); }
  .status-dot.active { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 1s infinite; }
  .status-text { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .layout { display:flex; height:calc(100vh - 56px - 41px); }

  /* CALLER PANEL */
  .caller-panel { flex:1; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; position:relative; }

  .idle-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
  .idle-icon { font-size:48px; opacity:0.15; }
  .idle-text { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:5px; color:var(--text-dim); text-transform:uppercase; }
  .demo-countdown { font-family:'DM Mono',monospace; font-size:11px; color:var(--gold-dim); margin-top:8px; letter-spacing:2px; }

  .incoming-state { flex:1; display:none; flex-direction:column; padding:32px; gap:0; overflow-y:auto; }
  .caller-badge { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:5px; color:var(--green); text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
  .caller-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 1s infinite; display:inline-block; }
  .caller-name { font-size:28px; font-weight:600; color:var(--text); margin-bottom:6px; }
  .caller-phone { font-family:'DM Mono',monospace; font-size:14px; color:var(--gold); letter-spacing:2px; margin-bottom:20px; }
  .caller-address-block { background:var(--surface2); border:1px solid var(--border); padding:16px 20px; margin-bottom:20px; }
  .addr-label { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:4px; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; }
  .addr-text { font-size:14px; color:var(--text); line-height:1.5; }
  .addr-distance { font-family:'DM Mono',monospace; font-size:11px; color:var(--gold); margin-top:6px; }

  .maps-btn { background:none; border:1px solid var(--border); color:var(--text-dim); font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; padding:8px 14px; cursor:pointer; text-transform:uppercase; width:100%; margin-top:8px; }

  .action-row { display:flex; gap:8px; margin-bottom:20px; }
  .close-btn { flex:1; background:var(--surface2); border:1px solid var(--border); color:var(--text-mid); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; padding:14px; cursor:pointer; text-transform:uppercase; }
  .print-btn { background:none; border:1px solid var(--border-gold); color:var(--gold); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; padding:14px 20px; cursor:pointer; text-transform:uppercase; }

  .orders-label { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:4px; color:var(--text-dim); text-transform:uppercase; margin-bottom:12px; }
  .order-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
  .order-name { font-size:13px; color:var(--text); }
  .order-date { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); }
  .order-amount { font-family:'DM Mono',monospace; font-size:11px; color:var(--gold); }

  /* RIGHT PANEL */
  .history-panel { width:320px; display:flex; flex-direction:column; }
  .panel-tabs { display:flex; border-bottom:1px solid var(--border); }
  .panel-tab { flex:1; background:none; border:none; border-bottom:2px solid transparent; color:var(--text-dim); font-family:'DM Mono',monospace; font-size:9px; letter-spacing:3px; padding:16px; cursor:pointer; text-transform:uppercase; }
  .panel-tab.active { background:var(--surface2); border-bottom:2px solid var(--gold); color:var(--gold); }

  .panel-calls { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
  .panel-header { padding:12px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .panel-title { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--text-dim); }
  .panel-count { font-family:'DM Mono',monospace; font-size:10px; color:var(--gold-dim); }

  .history-list { flex:1; overflow-y:auto; }
  .history-item { padding:16px 24px; border-bottom:1px solid var(--border); cursor:pointer; }
  .history-item:hover { background:var(--surface2); }
  .hi-time { font-family:'DM Mono',monospace; font-size:9px; color:var(--text-dim); margin-bottom:4px; }
  .hi-name { font-size:13px; font-weight:500; color:var(--text); }
  .hi-addr { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .history-empty { padding:40px 24px; text-align:center; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; }

  .panel-contacts { flex:1; overflow:hidden; display:none; flex-direction:column; }
  .search-box { padding:12px 16px; border-bottom:1px solid var(--border); }
  .search-input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; padding:8px 12px; outline:none; }

  /* PRINT MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
  .modal-box { background:var(--surface); border:1px solid var(--border-gold); padding:32px; width:400px; max-width:90vw; }
  .modal-title { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:5px; color:var(--text-dim); text-transform:uppercase; margin-bottom:20px; }
  .type-row { display:flex; gap:8px; margin-bottom:20px; }
  .type-btn { flex:1; border:none; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:2px; padding:14px; cursor:pointer; text-transform:uppercase; }
  .type-btn.active { background:var(--gold); color:var(--bg); }
  .type-btn.inactive { background:none; color:var(--text-dim); border:1px solid var(--border); }
  .modal-actions { display:flex; gap:8px; }
  .btn-print { flex:1; background:var(--gold); color:var(--bg); border:none; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; padding:12px; cursor:pointer; text-transform:uppercase; }
  .btn-cancel { background:none; border:1px solid var(--border); color:var(--text-dim); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; padding:12px 20px; cursor:pointer; text-transform:uppercase; }

  /* MAPS OVERLAY */
  .maps-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:300; align-items:center; justify-content:center; }
  .maps-box { background:var(--surface); border:1px solid var(--border-gold); padding:32px; width:420px; max-width:90vw; text-align:center; }
  .maps-addr { font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text); margin-bottom:8px; }
  .maps-dist { font-family:'DM Mono',monospace; font-size:13px; color:var(--gold); margin-bottom:24px; }
  .maps-link { display:block; background:var(--gold); color:var(--bg); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; padding:14px; text-decoration:none; text-transform:uppercase; margin-bottom:10px; }
  .maps-close { background:none; border:1px solid var(--border); color:var(--text-dim); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; padding:12px 24px; cursor:pointer; text-transform:uppercase; width:100%; }

  /* PRINT RECEIPT */
  #printReceipt { display:none; }
  @media print {
    body > *:not(#printReceipt) { display:none !important; }
    #printReceipt { display:block !important; font-family:monospace; font-size:12px; width:72mm; margin:0; padding:4mm; color:#000; background:#fff; }
  }
</style>
</head>
<body>

<!-- DEMO BANNER -->
<div class="demo-banner">
  <div>
    <div class="demo-label">⚡ Live Demo — Bogong Dial</div>
  </div>
  <button class="demo-restart" onclick="restartDemo()">↺ Restart Demo</button>
</div>

<header>
  <div>
    <div class="header-brand">Bogong Dial</div>
    <div class="header-sub">bogongai.net · Mordi Pizza & Pasta</div>
  </div>
  <div class="header-status">
    <button onclick="toggleAddCustomer()" style="background:none;border:1px solid var(--border-gold);color:var(--gold);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;padding:7px 14px;cursor:pointer;text-transform:uppercase;margin-right:12px">+ Add Customer</button>
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Waiting</span>
  </div>
</header>

<div class="layout">
  <div class="caller-panel">

    <!-- IDLE -->
    <div class="idle-state" id="idleState">
      <div class="idle-icon">📞</div>
      <div class="idle-text">Waiting for calls</div>
      <div class="demo-countdown" id="demoCountdown"></div>
    </div>

    <!-- INCOMING -->
    <div class="incoming-state" id="incomingState">
      <div class="caller-badge">Incoming Call</div>
      <div class="caller-name" id="callerName"></div>
      <div class="caller-phone" id="callerPhone"></div>
      <div class="caller-address-block">
        <div class="addr-label">Delivery Address</div>
        <div class="addr-text" id="callerAddress"></div>
        <div class="addr-distance" id="callerDistance"></div>
        <button class="maps-btn" onclick="openMapsOverlay()">📍 Open in Maps</button>
      </div>
      <div class="action-row">
        <button class="close-btn" onclick="closeCall()">✓ Close</button>
        <button class="print-btn" onclick="showPrintModal()">🖨 Print</button>
      </div>
      <div class="orders-label">Recent Orders</div>
      <div id="lastOrders"></div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="history-panel">
    <div class="panel-tabs">
      <button class="panel-tab active" id="tabCalls" onclick="switchTab('calls')">Calls</button>
      <button class="panel-tab" id="tabContacts" onclick="switchTab('contacts')">Contacts</button>
    </div>

    <div class="panel-calls" id="panelCalls">
      <div class="panel-header">
        <span class="panel-title">Today</span>
        <span class="panel-count" id="callCount">0 calls</span>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No calls yet</div>
      </div>
    </div>

    <div class="panel-contacts" id="panelContacts">
      <div class="search-box">
        <input type="text" class="search-input" placeholder="Search name or phone..." oninput="searchContacts(this.value)">
      </div>
      <div class="history-list" id="contactList">
        <div class="history-empty">No contacts yet</div>
      </div>
    </div>
  </div>
</div>

<!-- PRINT MODAL -->
<div class="modal-overlay" id="printModal">
  <div class="modal-box">
    <div class="modal-title">Print Order</div>
    <div class="type-row">
      <button class="type-btn active" id="btnDelivery" onclick="selectType('DELIVERY')">Delivery</button>
      <button class="type-btn inactive" id="btnPickup" onclick="selectType('PICKUP')">Pickup</button>
    </div>
    <div class="modal-actions">
      <button class="btn-print" onclick="doPrint()">Print</button>
      <button class="btn-cancel" onclick="closePrintModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- MAPS OVERLAY -->
<div class="maps-overlay" id="mapsOverlay">
  <div class="maps-box">
    <div class="modal-title">Delivery Address</div>
    <div class="maps-addr" id="mapsAddr"></div>
    <div class="maps-dist" id="mapsDist"></div>
    <a class="maps-link" id="mapsLink" href="#" target="_blank">📍 Open in Google Maps</a>
    <button class="maps-close" onclick="closeMapsOverlay()">Close</button>
  </div>
</div>

<!-- PRINT RECEIPT -->
<div id="printReceipt"><div id="receiptContent"></div></div>

<script>
const DEMO_CUSTOMER = {
  name: 'John Smith',
  phone: '0400000000',
  address: '4 Station St, Mordialloc VIC 3195',
  distance: '~0.3 km',
  orders: [
    { name: 'Large Pepperoni + Garlic Bread', date: '2 weeks ago', amount: '$36.50' },
    { name: 'Family Margherita', date: '1 month ago', amount: '$42.00' }
  ]
};

const STORE_LAT = -38.006537;
const STORE_LNG = 145.085749;
let callLog = [];
let printType = 'DELIVERY';
let demoTimer = null;
let countdownTimer = null;
let demoRunning = false;

function formatPhone(p) {
  const d = p.replace(/\D/g, '');
  if (d.length === 10) return d.slice(0,4) + ' ' + d.slice(4,7) + ' ' + d.slice(7);
  return p;
}

function setStatus(state, text) {
  document.getElementById('statusDot').className = 'status-dot' + (state === 'active' ? ' active' : '');
  document.getElementById('statusText').textContent = text;
}

function startDemo() {
  if (demoRunning) return;
  demoRunning = true;
  let secs = 3;
  document.getElementById('demoCountdown').textContent = 'Incoming call in ' + secs + 's...';
  countdownTimer = setInterval(() => {
    secs--;
    if (secs > 0) {
      document.getElementById('demoCountdown').textContent = 'Incoming call in ' + secs + 's...';
    } else {
      clearInterval(countdownTimer);
      document.getElementById('demoCountdown').textContent = '';
      showIncoming();
    }
  }, 1000);
}

function showIncoming() {
  const c = DEMO_CUSTOMER;
  document.getElementById('callerName').textContent = c.name;
  document.getElementById('callerPhone').textContent = formatPhone(c.phone);
  document.getElementById('callerAddress').textContent = c.address;
  document.getElementById('callerDistance').textContent = c.distance + ' from store';

  document.getElementById('lastOrders').innerHTML =
    '<div class="orders-label">Recent Orders</div>' +
    c.orders.map(o =>
      '<div class="order-item">' +
        '<span class="order-name">' + o.name + '</span>' +
        '<span class="order-date">' + o.date + '</span>' +
        '<span class="order-amount">' + o.amount + '</span>' +
      '</div>'
    ).join('');

  setStatus('active', 'Incoming Call');
  document.getElementById('idleState').style.display = 'none';
  document.getElementById('incomingState').style.display = 'flex';

  const now = new Date();
  const time = now.toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit' });
  callLog.unshift({ name: c.name, phone: c.phone, address: c.address, time });
  renderCalls();
}

function closeCall() {
  document.getElementById('incomingState').style.display = 'none';
  document.getElementById('idleState').style.display = 'flex';
  setStatus('idle', 'Waiting');
  demoRunning = false;
  // Auto restart after 5s
  demoTimer = setTimeout(startDemo, 5000);
  document.getElementById('demoCountdown').textContent = 'Next demo in 5s...';
  setTimeout(() => {
    let s = 4;
    const t = setInterval(() => {
      s--;
      if (s > 0) document.getElementById('demoCountdown').textContent = 'Next demo in ' + s + 's...';
      else clearInterval(t);
    }, 1000);
  }, 1000);
}

function restartDemo() {
  clearTimeout(demoTimer);
  clearInterval(countdownTimer);
  demoRunning = false;
  document.getElementById('incomingState').style.display = 'none';
  document.getElementById('idleState').style.display = 'flex';
  setStatus('idle', 'Waiting');
  closePrintModal();
  closeMapsOverlay();
  startDemo();
}

function renderCalls() {
  const list = document.getElementById('historyList');
  document.getElementById('callCount').textContent = callLog.length + ' call' + (callLog.length !== 1 ? 's' : '');
  if (!callLog.length) { list.innerHTML = '<div class="history-empty">No calls yet</div>'; return; }
  list.innerHTML = callLog.map(c =>
    '<div class="history-item">' +
      '<div class="hi-time">' + c.time + '</div>' +
      '<div class="hi-name">' + c.name + '</div>' +
      '<div class="hi-addr">' + c.address + '</div>' +
    '</div>'
  ).join('');
  renderContactList();
}

function switchTab(tab) {
  document.getElementById('panelCalls').style.display = tab === 'calls' ? 'flex' : 'none';
  document.getElementById('panelContacts').style.display = tab === 'contacts' ? 'flex' : 'none';
  document.getElementById('tabCalls').className = 'panel-tab' + (tab === 'calls' ? ' active' : '');
  document.getElementById('tabContacts').className = 'panel-tab' + (tab === 'contacts' ? ' active' : '');
}

function renderContactList(filter) {
  const el = document.getElementById('contactList');
  const list = filter ? callLog.filter(c =>
    c.name.toLowerCase().includes(filter) ||
    c.phone.includes(filter) ||
    c.address.toLowerCase().includes(filter)
  ) : callLog;
  if (!list.length) { el.innerHTML = '<div class="history-empty">No contacts found</div>'; return; }
  el.innerHTML = list.map(c =>
    '<div class="history-item">' +
      '<div class="hi-name">' + c.name + '</div>' +
      '<div class="hi-time">' + formatPhone(c.phone) + '</div>' +
      '<div class="hi-addr">' + c.address + '</div>' +
    '</div>'
  ).join('');
}

function searchContacts(q) { renderContactList(q.toLowerCase()); }

// Print
function showPrintModal() { document.getElementById('printModal').style.display = 'flex'; }
function closePrintModal() { document.getElementById('printModal').style.display = 'none'; }
function selectType(t) {
  printType = t;
  document.getElementById('btnDelivery').className = 'type-btn ' + (t === 'DELIVERY' ? 'active' : 'inactive');
  document.getElementById('btnPickup').className = 'type-btn ' + (t === 'PICKUP' ? 'active' : 'inactive');
}
function doPrint() {
  const c = DEMO_CUSTOMER;
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-AU');
  const timeStr = now.toLocaleTimeString('en-AU', { hour:'2-digit', minute:'2-digit' });
  const feeRow = printType === 'DELIVERY' ? '<div style="display:flex;justify-content:space-between;margin:6px 0"><span>Delivery Fee</span><span>$7.00</span></div><hr style="border:none;border-top:1px dashed #000;margin:6px 0">' : '';
  document.getElementById('receiptContent').innerHTML =
    '<div style="text-align:center;font-weight:bold;font-size:14px;margin-bottom:2px">MORDI PIZZA &amp; PASTA</div>' +
    '<hr style="border:none;border-top:1px solid #000;margin:4px 0">' +
    '<div style="display:flex;justify-content:space-between"><span>Date: ' + dateStr + '</span><span>Time: ' + timeStr + '</span></div>' +
    '<hr style="border:none;border-top:1px dashed #000;margin:6px 0">' +
    '<div style="font-weight:bold;font-size:13px;margin:4px 0">' + printType + '</div>' +
    '<div>Time Given: ___________________________</div>' +
    '<hr style="border:none;border-top:1px dashed #000;margin:6px 0">' +
    '<div>Name: &nbsp; ' + c.name + '</div>' +
    '<div>Phone: ' + formatPhone(c.phone) + '</div>' +
    (printType === 'DELIVERY' ? '<div>Addr: &nbsp; ' + c.address + '</div>' : '') +
    '<hr style="border:none;border-top:1px dashed #000;margin:6px 0">' +
    feeRow +
    '<div>Order Taken By: ___________________</div>' +
    '<hr style="border:none;border-top:1px dashed #000;margin:6px 0">' +
    '<div>Note: _________________________________</div>';
  document.getElementById('printReceipt').style.display = 'block';
  closePrintModal();
  setTimeout(() => { window.print(); document.getElementById('printReceipt').style.display = 'none'; }, 100);
}

// Maps
function openMapsOverlay() {
  const q = encodeURIComponent(DEMO_CUSTOMER.address);
  document.getElementById('mapsAddr').textContent = DEMO_CUSTOMER.address;
  document.getElementById('mapsDist').textContent = DEMO_CUSTOMER.distance + ' from store';
  document.getElementById('mapsLink').href = 'https://www.google.com/maps/dir/?api=1&origin=' + STORE_LAT + ',' + STORE_LNG + '&destination=' + q + '&travelmode=driving';
  document.getElementById('mapsOverlay').style.display = 'flex';
}
function closeMapsOverlay() { document.getElementById('mapsOverlay').style.display = 'none'; }

function toggleAddCustomer() {
  alert('In the live version, this opens a form to add a new customer to the database.');
}

// Start
startDemo();
</script>
</body>
</html>
