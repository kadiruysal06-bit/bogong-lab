<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bogong UniDash</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0f12;
  --ink-soft: #1c1c22;
  --ink-mid: #2a2a35;
  --gold: #c8a96e;
  --gold-dim: rgba(200,169,110,0.3);
  --gold-glow: rgba(200,169,110,0.12);
  --slate: #f4f3f0;
  --white: #fefefe;
  --blue: #1a3a5c;
  --blue-light: #4a8ab5;
  --text-dim: rgba(255,255,255,0.4);
  --text-soft: rgba(255,255,255,0.65);
  --text-bright: rgba(255,255,255,0.88);
  --border: rgba(255,255,255,0.07);
  --border-gold: rgba(200,169,110,0.2);
  --claude: #c8a96e;
  --gemini: #4a8ab5;
  --gpt: #6eb5a9;
}

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–ink);
color: var(–text-bright);
font-family: ‘DM Sans’, sans-serif;
font-weight: 300;
min-height: 100vh;
overflow: hidden;
display: flex;
flex-direction: column;
}

/* CANVAS */
#bgCanvas {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 0;
}

/* MOTH CANVAS */
#mothCanvas {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 1;
}

/* LAYOUT */
.app {
position: relative;
z-index: 2;
display: flex;
flex-direction: column;
height: 100vh;
}

/* HEADER */
header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 24px;
border-bottom: 1px solid var(–border);
background: rgba(15,15,18,0.8);
backdrop-filter: blur(20px);
flex-shrink: 0;
}

.header-left {
display: flex;
align-items: center;
gap: 16px;
}

.logo-mark {
font-family: ‘Cormorant Garamond’, serif;
font-size: 13px;
letter-spacing: 5px;
color: var(–gold);
text-transform: uppercase;
}

.logo-sep {
width: 1px;
height: 18px;
background: var(–border-gold);
}

.logo-sub {
font-size: 10px;
letter-spacing: 4px;
color: var(–text-dim);
text-transform: uppercase;
}

.header-center {
display: flex;
gap: 4px;
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
padding: 3px;
border-radius: 2px;
}

.mode-btn {
background: transparent;
border: none;
color: var(–text-dim);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
padding: 6px 18px;
cursor: pointer;
transition: all 0.3s;
border-radius: 1px;
}

.mode-btn.active {
background: var(–gold-dim);
color: var(–gold);
}

.header-right {
display: flex;
align-items: center;
gap: 12px;
}

.project-select {
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
color: var(–text-soft);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 2px;
padding: 6px 12px;
outline: none;
cursor: pointer;
}

.project-select option {
background: var(–ink-soft);
color: var(–text-bright);
}

.settings-btn {
background: transparent;
border: 1px solid var(–border);
color: var(–text-dim);
width: 30px;
height: 30px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.3s;
}

.settings-btn:hover {
border-color: var(–border-gold);
color: var(–gold);
}

/* MAIN AREA */
.main {
display: flex;
flex: 1;
overflow: hidden;
}

/* SIDEBAR */
.sidebar {
width: 200px;
border-right: 1px solid var(–border);
display: flex;
flex-direction: column;
flex-shrink: 0;
background: rgba(15,15,18,0.5);
overflow-y: auto;
}

.sidebar-section {
padding: 16px;
border-bottom: 1px solid var(–border);
}

.sidebar-label {
font-size: 9px;
letter-spacing: 4px;
color: var(–text-dim);
text-transform: uppercase;
margin-bottom: 10px;
}

.file-item {
display: flex;
align-items: center;
gap: 8px;
padding: 6px 8px;
cursor: pointer;
border-radius: 2px;
transition: all 0.2s;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–text-soft);
}

.file-item:hover {
background: rgba(255,255,255,0.04);
color: var(–text-bright);
}

.file-item.active {
background: var(–gold-glow);
color: var(–gold);
}

.file-dot {
width: 5px;
height: 5px;
border-radius: 50%;
background: var(–text-dim);
flex-shrink: 0;
}

.file-item.active .file-dot {
background: var(–gold);
}

/* PANELS AREA */
.panels-area {
flex: 1;
display: flex;
flex-direction: column;
overflow: hidden;
}

/* AI PANELS */
.panels-grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 1px;
background: var(–border);
flex: 1;
overflow: hidden;
}

.ai-panel {
background: var(–ink);
display: flex;
flex-direction: column;
overflow: hidden;
position: relative;
}

.panel-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 16px;
border-bottom: 1px solid var(–border);
flex-shrink: 0;
}

.panel-name {
display: flex;
align-items: center;
gap: 8px;
}

.panel-dot {
width: 6px;
height: 6px;
border-radius: 50%;
}

.panel-dot.claude { background: var(–claude); }
.panel-dot.gemini { background: var(–gemini); }
.panel-dot.gpt { background: var(–gpt); }

.panel-title {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–text-soft);
}

.panel-actions {
display: flex;
gap: 6px;
}

.panel-btn {
background: transparent;
border: 1px solid var(–border);
color: var(–text-dim);
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 2px;
padding: 3px 8px;
cursor: pointer;
transition: all 0.2s;
text-transform: uppercase;
}

.panel-btn:hover {
border-color: var(–border-gold);
color: var(–gold);
}

/* CHAT MESSAGES */
.panel-messages {
flex: 1;
overflow-y: auto;
padding: 16px;
display: flex;
flex-direction: column;
gap: 12px;
scrollbar-width: thin;
scrollbar-color: var(–border) transparent;
}

.panel-messages::-webkit-scrollbar {
width: 3px;
}

.panel-messages::-webkit-scrollbar-track {
background: transparent;
}

.panel-messages::-webkit-scrollbar-thumb {
background: var(–border);
border-radius: 2px;
}

.msg {
display: flex;
flex-direction: column;
gap: 4px;
}

.msg-role {
font-size: 9px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–text-dim);
}

.msg.user .msg-role { color: var(–gold); opacity: 0.6; }

.msg-content {
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
line-height: 1.7;
color: var(–text-soft);
}

.msg.user .msg-content {
color: var(–text-bright);
font-size: 13px;
}

.msg-content code {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
background: rgba(255,255,255,0.06);
padding: 1px 5px;
border-radius: 2px;
color: var(–gold);
}

.msg-content pre {
background: rgba(0,0,0,0.4);
border: 1px solid var(–border);
border-left: 2px solid var(–border-gold);
padding: 12px;
margin: 8px 0;
overflow-x: auto;
border-radius: 2px;
}

.msg-content pre code {
background: transparent;
padding: 0;
color: var(–text-soft);
font-size: 11px;
}

/* STREAMING CURSOR */
.streaming-cursor {
display: inline-block;
width: 2px;
height: 13px;
background: var(–gold);
margin-left: 2px;
vertical-align: text-bottom;
animation: blink 0.8s ease-in-out infinite;
}

@keyframes blink {
0%, 100% { opacity: 1; }
50% { opacity: 0; }
}

/* LOADER DOTS */
.loader {
display: flex;
gap: 4px;
align-items: center;
padding: 4px 0;
}

.loader span {
width: 4px;
height: 4px;
border-radius: 50%;
background: var(–text-dim);
animation: ldot 1.2s ease-in-out infinite;
}

.loader span:nth-child(2) { animation-delay: 0.2s; }
.loader span:nth-child(3) { animation-delay: 0.4s; }

@keyframes ldot {
0%, 100% { transform: translateY(0); opacity: 0.3; }
50% { transform: translateY(-4px); opacity: 1; }
}

/* INPUT AREA */
.input-area {
border-top: 1px solid var(–border);
padding: 12px 16px;
background: rgba(15,15,18,0.9);
backdrop-filter: blur(20px);
flex-shrink: 0;
}

.input-top {
display: flex;
gap: 8px;
margin-bottom: 10px;
flex-wrap: wrap;
}

.ai-toggle {
display: flex;
align-items: center;
gap: 6px;
background: rgba(255,255,255,0.03);
border: 1px solid var(–border);
padding: 5px 10px;
cursor: pointer;
transition: all 0.2s;
user-select: none;
}

.ai-toggle.on { border-color: var(–border-gold); }
.ai-toggle.on.claude { border-color: rgba(200,169,110,0.4); }
.ai-toggle.on.gemini { border-color: rgba(74,138,181,0.4); }
.ai-toggle.on.gpt { border-color: rgba(110,181,169,0.4); }

.ai-toggle-dot {
width: 5px;
height: 5px;
border-radius: 50%;
opacity: 0.3;
transition: opacity 0.2s;
}

.ai-toggle.on .ai-toggle-dot { opacity: 1; }
.ai-toggle-dot.claude { background: var(–claude); }
.ai-toggle-dot.gemini { background: var(–gemini); }
.ai-toggle-dot.gpt { background: var(–gpt); }

.ai-toggle-label {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–text-dim);
transition: color 0.2s;
}

.ai-toggle.on .ai-toggle-label { color: var(–text-soft); }

.input-row {
display: flex;
gap: 8px;
align-items: flex-end;
}

.input-box {
flex: 1;
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
transition: border-color 0.3s;
display: flex;
align-items: flex-end;
}

.input-box:focus-within {
border-color: var(–border-gold);
}

.input-box textarea {
flex: 1;
background: transparent;
border: none;
color: var(–text-bright);
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
font-weight: 300;
outline: none;
resize: none;
padding: 10px 14px;
min-height: 40px;
max-height: 120px;
line-height: 1.6;
}

.input-box textarea::placeholder {
color: var(–text-dim);
}

.send-btn {
background: var(–gold-dim);
border: 1px solid var(–border-gold);
color: var(–gold);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
padding: 10px 20px;
cursor: pointer;
transition: all 0.3s;
height: 42px;
white-space: nowrap;
}

.send-btn:hover {
background: rgba(200,169,110,0.2);
}

.send-btn:disabled {
opacity: 0.4;
cursor: not-allowed;
}

/* SETTINGS PANEL */
.settings-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.6);
z-index: 100;
display: none;
align-items: center;
justify-content: center;
backdrop-filter: blur(4px);
}

.settings-overlay.show {
display: flex;
}

.settings-panel {
background: var(–ink-soft);
border: 1px solid var(–border-gold);
width: 560px;
max-height: 80vh;
overflow-y: auto;
padding: 28px;
}

.settings-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 22px;
font-weight: 300;
color: var(–gold);
letter-spacing: 2px;
margin-bottom: 24px;
}

.settings-group {
margin-bottom: 20px;
}

.settings-group-label {
font-size: 9px;
letter-spacing: 4px;
color: var(–text-dim);
text-transform: uppercase;
margin-bottom: 8px;
display: flex;
align-items: center;
gap: 8px;
}

.settings-group-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}

.settings-input {
width: 100%;
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
color: var(–text-bright);
font-family: ‘DM Mono’, monospace;
font-size: 11px;
padding: 8px 12px;
outline: none;
transition: border-color 0.3s;
margin-bottom: 6px;
}

.settings-input:focus {
border-color: var(–border-gold);
}

.settings-textarea {
width: 100%;
background: rgba(255,255,255,0.04);
border: 1px solid var(–border);
color: var(–text-soft);
font-family: ‘DM Mono’, monospace;
font-size: 11px;
padding: 8px 12px;
outline: none;
resize: vertical;
min-height: 80px;
line-height: 1.6;
transition: border-color 0.3s;
}

.settings-textarea:focus {
border-color: var(–border-gold);
}

.settings-actions {
display: flex;
justify-content: flex-end;
gap: 8px;
margin-top: 20px;
}

.btn-cancel {
background: transparent;
border: 1px solid var(–border);
color: var(–text-dim);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 2px;
padding: 8px 20px;
cursor: pointer;
text-transform: uppercase;
transition: all 0.2s;
}

.btn-cancel:hover { color: var(–text-soft); }

.btn-save {
background: var(–gold-dim);
border: 1px solid var(–border-gold);
color: var(–gold);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 2px;
padding: 8px 20px;
cursor: pointer;
text-transform: uppercase;
transition: all 0.2s;
}

.btn-save:hover { background: rgba(200,169,110,0.2); }

/* CONTEXT BAR */
.context-bar {
display: flex;
align-items: center;
gap: 6px;
padding: 6px 16px;
border-bottom: 1px solid var(–border);
background: rgba(15,15,18,0.6);
flex-shrink: 0;
flex-wrap: wrap;
min-height: 32px;
}

.context-label {
font-size: 9px;
letter-spacing: 3px;
color: var(–text-dim);
text-transform: uppercase;
margin-right: 4px;
}

.context-tag {
background: rgba(200,169,110,0.08);
border: 1px solid var(–border-gold);
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 1px;
color: var(–gold);
padding: 2px 8px;
display: flex;
align-items: center;
gap: 4px;
}

.context-tag-remove {
cursor: pointer;
opacity: 0.5;
transition: opacity 0.2s;
}

.context-tag-remove:hover { opacity: 1; }

/* EMPTY STATE */
.empty-state {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100%;
gap: 8px;
opacity: 0.25;
}

.empty-state-icon {
font-family: ‘Cormorant Garamond’, serif;
font-size: 32px;
font-style: italic;
color: var(–gold);
}

.empty-state-text {
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–text-dim);
}

/* COPY TOAST */
.copy-toast {
position: fixed;
bottom: 80px;
left: 50%;
transform: translateX(-50%);
background: var(–gold-dim);
border: 1px solid var(–border-gold);
color: var(–gold);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 3px;
padding: 8px 20px;
z-index: 200;
opacity: 0;
transition: opacity 0.3s;
pointer-events: none;
text-transform: uppercase;
}

.copy-toast.show { opacity: 1; }

/* SCROLLBAR */
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(–border); }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(6px); }
to { opacity: 1; transform: translateY(0); }
}

.msg { animation: fadeUp 0.3s ease forwards; }
</style>

</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="mothCanvas"></canvas>

<div class="app">
  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo-mark">Bogong</div>
      <div class="logo-sep"></div>
      <div class="logo-sub">UniDash</div>
    </div>
    <div class="header-center">
      <button class="mode-btn active" id="btnThink" onclick="setMode('think')">Think</button>
      <button class="mode-btn" id="btnDo" onclick="setMode('do')">Do</button>
    </div>
    <div class="header-right">
      <select class="project-select" id="projectSelect" onchange="setProject(this.value)">
        <option value="bogong-net">bogongai.net</option>
        <option value="mirrors">Mirrors</option>
        <option value="house-of-cb">House of CB</option>
        <option value="general">General</option>
      </select>
      <div class="settings-btn" onclick="openSettings()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
      </div>
    </div>
  </header>

  <!-- MAIN -->

  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Context</div>
        <div class="file-item" onclick="addContext('api/chat.js')">
          <div class="file-dot"></div>api/chat.js
        </div>
        <div class="file-item" onclick="addContext('api/reflect.js')">
          <div class="file-dot"></div>api/reflect.js
        </div>
        <div class="file-item" onclick="addContext('index.html')">
          <div class="file-dot"></div>index.html
        </div>
        <div class="file-item" onclick="addContext('mirrors.html')">
          <div class="file-dot"></div>mirrors.html
        </div>
        <div class="file-item" onclick="addContext('vercel.json')">
          <div class="file-dot"></div>vercel.json
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Quick Prompts</div>
        <div class="file-item" onclick="quickPrompt('Review this code for bugs and security issues')">
          <div class="file-dot"></div>Bug review
        </div>
        <div class="file-item" onclick="quickPrompt('Explain the architecture of this')">
          <div class="file-dot"></div>Explain
        </div>
        <div class="file-item" onclick="quickPrompt('How can we improve this?')">
          <div class="file-dot"></div>Improve
        </div>
        <div class="file-item" onclick="quickPrompt('Write tests for this')">
          <div class="file-dot"></div>Write tests
        </div>
      </div>
    </div>


<!-- PANELS AREA -->
<div class="panels-area">
  <!-- CONTEXT BAR -->
  <div class="context-bar" id="contextBar">
    <span class="context-label">Context</span>
    <span id="contextTags"></span>
  </div>

  <!-- PANELS GRID -->
  <div class="panels-grid">
    <!-- CLAUDE -->
    <div class="ai-panel" id="panel-claude">
      <div class="panel-header">
        <div class="panel-name">
          <div class="panel-dot claude"></div>
          <div class="panel-title">Claude</div>
        </div>
        <div class="panel-actions">
          <button class="panel-btn" onclick="copyPanel('claude')">Copy</button>
          <button class="panel-btn" onclick="clearPanel('claude')">Clear</button>
        </div>
      </div>
      <div class="panel-messages" id="messages-claude">
        <div class="empty-state">
          <div class="empty-state-icon">&#9672;</div>
          <div class="empty-state-text">Waiting</div>
        </div>
      </div>
    </div>

    <!-- GEMINI -->
    <div class="ai-panel" id="panel-gemini">
      <div class="panel-header">
        <div class="panel-name">
          <div class="panel-dot gemini"></div>
          <div class="panel-title">Gemini</div>
        </div>
        <div class="panel-actions">
          <button class="panel-btn" onclick="copyPanel('gemini')">Copy</button>
          <button class="panel-btn" onclick="clearPanel('gemini')">Clear</button>
        </div>
      </div>
      <div class="panel-messages" id="messages-gemini">
        <div class="empty-state">
          <div class="empty-state-icon">&#9672;</div>
          <div class="empty-state-text">Waiting</div>
        </div>
      </div>
    </div>

    <!-- GPT -->
    <div class="ai-panel" id="panel-gpt">
      <div class="panel-header">
        <div class="panel-name">
          <div class="panel-dot gpt"></div>
          <div class="panel-title">GPT</div>
        </div>
        <div class="panel-actions">
          <button class="panel-btn" onclick="copyPanel('gpt')">Copy</button>
          <button class="panel-btn" onclick="clearPanel('gpt')">Clear</button>
        </div>
      </div>
      <div class="panel-messages" id="messages-gpt">
        <div class="empty-state">
          <div class="empty-state-icon">&#9672;</div>
          <div class="empty-state-text">Waiting</div>
        </div>
      </div>
    </div>
  </div>

  <!-- INPUT AREA -->
  <div class="input-area">
    <div class="input-top">
      <div class="ai-toggle on claude" id="toggle-claude" onclick="toggleAI('claude')">
        <div class="ai-toggle-dot claude"></div>
        <div class="ai-toggle-label">Claude</div>
      </div>
      <div class="ai-toggle on gemini" id="toggle-gemini" onclick="toggleAI('gemini')">
        <div class="ai-toggle-dot gemini"></div>
        <div class="ai-toggle-label">Gemini</div>
      </div>
      <div class="ai-toggle on gpt" id="toggle-gpt" onclick="toggleAI('gpt')">
        <div class="ai-toggle-dot gpt"></div>
        <div class="ai-toggle-label">GPT</div>
      </div>
    </div>
    <div class="input-row">
      <div class="input-box">
        <textarea id="mainInput" placeholder="Think or build... Enter to send, Shift+Enter for new line" rows="1"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>


  </div>
</div>

<!-- SETTINGS -->

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="settings-title">System Prompts</div>


<div class="settings-group">
  <div class="settings-group-label">Claude</div>
  <textarea class="settings-textarea" id="promptClaude" placeholder="You are an expert system architect who knows the Bogong project deeply..."></textarea>
</div>

<div class="settings-group">
  <div class="settings-group-label">Gemini</div>
  <textarea class="settings-textarea" id="promptGemini" placeholder="You are a rapid prototyper and creative problem solver..."></textarea>
</div>

<div class="settings-group">
  <div class="settings-group-label">GPT</div>
  <textarea class="settings-textarea" id="promptGpt" placeholder="You are a code reviewer and debugging specialist..."></textarea>
</div>



<div class="settings-actions">
  <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
  <button class="btn-save" onclick="saveSettings()">Save</button>
</div>


  </div>
</div>

<div class="copy-toast" id="copyToast">Copied</div>
